<svg viewBox="0 0 960 580" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="bgm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/><stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="mGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#065f46"/><stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
    <linearGradient id="mBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/><stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="mPurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b0764"/><stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="mOrch" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <filter id="drop3">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <marker id="mArr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#475569"/>
    </marker>
    <marker id="mArrG" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#10b981"/>
    </marker>
    <marker id="mArrB" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#60a5fa"/>
    </marker>
    <marker id="mArrY" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#fbbf24"/>
    </marker>
    <marker id="mArrR" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="960" height="580" fill="url(#bgm)" rx="18"/>
  <rect x="1" y="1" width="958" height="578" fill="none" stroke="#21262d" stroke-width="1.5" rx="18"/>

  <!-- Title -->
  <text x="480" y="42" text-anchor="middle" fill="#f0f6fc" font-size="21" font-weight="800" letter-spacing="1">DISTRIBUTED MEMORY MODEL</text>
  <text x="480" y="64" text-anchor="middle" fill="#8b949e" font-size="12">READ is open to all  ·  WRITE is locked to owner namespace</text>
  <line x1="160" y1="76" x2="800" y2="76" stroke="#30363d" stroke-width="1"/>

  <!-- Central DB box -->
  <rect x="310" y="90" width="340" height="200" rx="14" fill="#0d1117" stroke="#30363d" stroke-width="2" filter="url(#drop3)"/>
  <rect x="310" y="90" width="340" height="32" rx="14" fill="#059669"/>
  <rect x="310" y="108" width="340" height="14" rx="0" fill="#059669"/>
  <text x="480" y="112" text-anchor="middle" fill="#fff" font-size="13" font-weight="800">spawnverse.db  (SQLite · WAL)</text>

  <!-- Namespace rows -->
  <rect x="322" y="130" width="316" height="28" rx="5" fill="#0c1a12" stroke="#059669" stroke-width="1"/>
  <text x="340" y="149" fill="#34d399" font-size="10" font-weight="700">system.*</text>
  <text x="500" y="149" fill="#6ee7b7" font-size="9">task description · config · plan · run_id</text>

  <rect x="322" y="164" width="316" height="28" rx="5" fill="#0c1828" stroke="#0284c7" stroke-width="1"/>
  <text x="340" y="183" fill="#60a5fa" font-size="10" font-weight="700">flight_agent.*</text>
  <text x="500" y="183" fill="#93c5fd" font-size="9">result · context · log  (own writes only)</text>

  <rect x="322" y="198" width="316" height="28" rx="5" fill="#100c28" stroke="#7c3aed" stroke-width="1"/>
  <text x="340" y="217" fill="#a78bfa" font-size="10" font-weight="700">hotel_agent.*</text>
  <text x="500" y="217" fill="#c4b5fd" font-size="9">result · context · log  (own writes only)</text>

  <rect x="322" y="232" width="316" height="28" rx="5" fill="#0c1810" stroke="#10b981" stroke-width="1"/>
  <text x="340" y="251" fill="#34d399" font-size="10" font-weight="700">budget_agent.*</text>
  <text x="500" y="251" fill="#6ee7b7" font-size="9">result · context · log  (own writes only)</text>

  <text x="480" y="284" text-anchor="middle" fill="#475569" font-size="9">+ messages · spawns · fossils · progress · relationships</text>

  <!-- AGENTS on left -->
  <!-- Orchestrator -->
  <rect x="30" y="100" width="200" height="50" rx="10" fill="url(#mOrch)" filter="url(#drop3)"/>
  <text x="130" y="122" text-anchor="middle" fill="#fff" font-size="12" font-weight="800">ORCHESTRATOR</text>
  <text x="130" y="140" text-anchor="middle" fill="#c4b5fd" font-size="9">WRITE: system.* only</text>

  <!-- Arrow from orch to DB (yellow WRITE) -->
  <line x1="230" y1="120" x2="308" y2="150" stroke="#fbbf24" stroke-width="2" marker-end="url(#mArrY)"/>
  <text x="258" y="128" fill="#fbbf24" font-size="8" transform="rotate(-15,258,128)">WRITE system.*</text>

  <!-- flight_agent -->
  <rect x="30" y="200" width="200" height="50" rx="10" fill="url(#mBlue)" stroke="#0284c7" stroke-width="1.5" filter="url(#drop3)"/>
  <text x="130" y="222" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">flight_agent</text>
  <text x="130" y="240" text-anchor="middle" fill="#93c5fd" font-size="9">WRITE: flight_agent.* only</text>

  <!-- READ arrow from flight_agent → DB (blue) -->
  <line x1="230" y1="215" x2="310" y2="178" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#mArrB)"/>
  <text x="258" y="193" fill="#60a5fa" font-size="8" transform="rotate(20,258,193)">READ any ns</text>

  <!-- WRITE arrow from flight_agent → DB (yellow) -->
  <line x1="230" y1="230" x2="310" y2="193" stroke="#fbbf24" stroke-width="2" marker-end="url(#mArrY)"/>
  <text x="263" y="218" fill="#fbbf24" font-size="8" transform="rotate(-10,263,218)">WRITE own ns</text>

  <!-- hotel_agent -->
  <rect x="30" y="300" width="200" height="50" rx="10" fill="url(#mPurple)" stroke="#7c3aed" stroke-width="1.5" filter="url(#drop3)"/>
  <text x="130" y="322" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">hotel_agent</text>
  <text x="130" y="340" text-anchor="middle" fill="#c4b5fd" font-size="9">WRITE: hotel_agent.* only</text>

  <!-- READ arrow hotel_agent -->
  <line x1="230" y1="315" x2="310" y2="215" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#mArrB)"/>
  <!-- WRITE arrow hotel_agent -->
  <line x1="230" y1="330" x2="310" y2="225" stroke="#fbbf24" stroke-width="2" marker-end="url(#mArrY)"/>

  <!-- AGENTS on right side — synthesis -->
  <rect x="730" y="150" width="200" height="60" rx="10" fill="url(#mBlue)" stroke="#0284c7" stroke-width="1.5" filter="url(#drop3)"/>
  <text x="830" y="175" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">itinerary_builder</text>
  <text x="830" y="192" text-anchor="middle" fill="#93c5fd" font-size="9">reads flight + hotel outputs</text>
  <text x="830" y="205" text-anchor="middle" fill="#60a5fa" font-size="8">WRITE: itinerary_builder.* only</text>

  <!-- READ all namespaces -->
  <line x1="730" y1="178" x2="652" y2="178" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#mArrB)"/>
  <text x="680" y="170" fill="#60a5fa" font-size="8">READ all</text>

  <!-- RULE BOXES at bottom -->
  <rect x="30" y="390" width="420" height="80" rx="10" fill="#0c1929" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="240" y="414" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="800">📖  READ — OPEN TO ALL</text>
  <text x="240" y="434" text-anchor="middle" fill="#93c5fd" font-size="10">read_output("any_agent_id")</text>
  <text x="240" y="450" text-anchor="middle" fill="#93c5fd" font-size="10">read_system("project")</text>
  <text x="240" y="466" text-anchor="middle" fill="#bfdbfe" font-size="9">Any agent can read any other agent's result at any time</text>

  <rect x="510" y="390" width="420" height="80" rx="10" fill="#1c0a04" stroke="#d97706" stroke-width="1.5"/>
  <text x="720" y="414" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="800">🔒  WRITE — OWN NAMESPACE ONLY</text>
  <text x="720" y="434" text-anchor="middle" fill="#fcd34d" font-size="10">write_result(value)  →  writes to flight_agent.result</text>
  <text x="720" y="450" text-anchor="middle" fill="#fcd34d" font-size="10">write_context(key, val)  →  writes to flight_agent.key</text>
  <text x="720" y="466" text-anchor="middle" fill="#fde68a" font-size="9">Enforced at code-generation AND at the database layer</text>

  <!-- WHY BOX -->
  <rect x="30" y="490" width="900" height="62" rx="10" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="480" y="514" text-anchor="middle" fill="#f9fafb" font-size="12" font-weight="700">WHY THIS MATTERS</text>
  <text x="480" y="534" text-anchor="middle" fill="#9ca3af" font-size="10">Without ownership: Agent A could overwrite Agent B's results. Data corruption. Race conditions.</text>
  <text x="480" y="548" text-anchor="middle" fill="#6b7280" font-size="10">With ownership: Full visibility across all agents · Zero interference · Concurrent-safe parallel writes</text>
</svg>
