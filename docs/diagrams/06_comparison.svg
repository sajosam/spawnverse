<svg viewBox="0 0 960 440" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="bgc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/><stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="cLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1c1c2e"/><stop offset="100%" stop-color="#1e1e3a"/>
    </linearGradient>
    <linearGradient id="cRight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a1929"/><stop offset="100%" stop-color="#0c2040"/>
    </linearGradient>
    <filter id="drop6">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="960" height="440" fill="url(#bgc)" rx="18"/>
  <rect x="1" y="1" width="958" height="438" fill="none" stroke="#21262d" stroke-width="1.5" rx="18"/>

  <!-- Title -->
  <text x="480" y="42" text-anchor="middle" fill="#f0f6fc" font-size="21" font-weight="800">SPAWNVERSE vs TRADITIONAL FRAMEWORKS</text>
  <line x1="160" y1="56" x2="800" y2="56" stroke="#30363d" stroke-width="1"/>

  <!-- Left panel header -->
  <rect x="30" y="64" width="420" height="40" rx="8" fill="#1a1a2e" stroke="#374151" stroke-width="1.5"/>
  <text x="240" y="89" text-anchor="middle" fill="#9ca3af" font-size="14" font-weight="800">TRADITIONAL  (LangChain / CrewAI / AutoGen)</text>

  <!-- Right panel header -->
  <rect x="510" y="64" width="420" height="40" rx="8" fill="#0c1929" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="720" y="89" text-anchor="middle" fill="#60a5fa" font-size="14" font-weight="800">SPAWNVERSE</text>

  <!-- Row 1 -->
  <rect x="30" y="110" width="420" height="46" rx="0" fill="#111827"/>
  <text x="240" y="128" text-anchor="middle" fill="#6b7280" font-size="11">Pre-built agents required</text>
  <text x="240" y="146" text-anchor="middle" fill="#4b5563" font-size="9">You define every role, prompt, tool before the task</text>

  <rect x="510" y="110" width="420" height="46" rx="0" fill="#0a1929"/>
  <text x="720" y="128" text-anchor="middle" fill="#34d399" font-size="11" font-weight="700">✓  Zero pre-built agents</text>
  <text x="720" y="146" text-anchor="middle" fill="#6ee7b7" font-size="9">Task describes the team. Agents invented at runtime.</text>

  <line x1="30" y1="156" x2="930" y2="156" stroke="#21262d" stroke-width="1"/>

  <!-- Row 2 -->
  <rect x="30" y="156" width="420" height="46" rx="0" fill="#0d1117"/>
  <text x="240" y="174" text-anchor="middle" fill="#6b7280" font-size="11">Static team structure</text>
  <text x="240" y="192" text-anchor="middle" fill="#4b5563" font-size="9">Same agents run regardless of what the task needs</text>

  <rect x="510" y="156" width="420" height="46" rx="0" fill="#0d1929"/>
  <text x="720" y="174" text-anchor="middle" fill="#34d399" font-size="11" font-weight="700">✓  Dynamic team emergence</text>
  <text x="720" y="192" text-anchor="middle" fill="#6ee7b7" font-size="9">Different tasks spawn completely different agent teams</text>

  <line x1="30" y1="202" x2="930" y2="202" stroke="#21262d" stroke-width="1"/>

  <!-- Row 3 -->
  <rect x="30" y="202" width="420" height="46" rx="0" fill="#111827"/>
  <text x="240" y="220" text-anchor="middle" fill="#6b7280" font-size="11">No memory ownership model</text>
  <text x="240" y="238" text-anchor="middle" fill="#4b5563" font-size="9">Any agent can write anywhere. Race conditions possible.</text>

  <rect x="510" y="202" width="420" height="46" rx="0" fill="#0a1929"/>
  <text x="720" y="220" text-anchor="middle" fill="#34d399" font-size="11" font-weight="700">✓  Distributed memory ownership</text>
  <text x="720" y="238" text-anchor="middle" fill="#6ee7b7" font-size="9">READ any namespace. WRITE own only. DB-enforced.</text>

  <line x1="30" y1="248" x2="930" y2="248" stroke="#21262d" stroke-width="1"/>

  <!-- Row 4 -->
  <rect x="30" y="248" width="420" height="46" rx="0" fill="#0d1117"/>
  <text x="240" y="266" text-anchor="middle" fill="#6b7280" font-size="11">No long memory across runs</text>
  <text x="240" y="284" text-anchor="middle" fill="#4b5563" font-size="9">Every run starts from zero. Nothing learned.</text>

  <rect x="510" y="248" width="420" height="46" rx="0" fill="#0d1929"/>
  <text x="720" y="266" text-anchor="middle" fill="#34d399" font-size="11" font-weight="700">✓  Fossil record</text>
  <text x="720" y="284" text-anchor="middle" fill="#6ee7b7" font-size="9">Every agent deposits constitution + scores. Future runs learn.</text>

  <line x1="30" y1="294" x2="930" y2="294" stroke="#21262d" stroke-width="1"/>

  <!-- Row 5 -->
  <rect x="30" y="294" width="420" height="46" rx="0" fill="#111827"/>
  <text x="240" y="312" text-anchor="middle" fill="#6b7280" font-size="11">No code-level safety</text>
  <text x="240" y="330" text-anchor="middle" fill="#4b5563" font-size="9">Generated code runs with full system access.</text>

  <rect x="510" y="294" width="420" height="46" rx="0" fill="#0a1929"/>
  <text x="720" y="312" text-anchor="middle" fill="#34d399" font-size="11" font-weight="700">✓  4-layer guardrails</text>
  <text x="720" y="330" text-anchor="middle" fill="#6ee7b7" font-size="9">Code scan + budget + output validate + semantic judge</text>

  <line x1="30" y1="340" x2="930" y2="340" stroke="#21262d" stroke-width="1"/>

  <!-- Row 6 -->
  <rect x="30" y="340" width="420" height="46" rx="0" fill="#0d1117"/>
  <text x="240" y="358" text-anchor="middle" fill="#6b7280" font-size="11">No intent alignment tracking</text>
  <text x="240" y="376" text-anchor="middle" fill="#4b5563" font-size="9">Unknown if agents are solving the actual task.</text>

  <rect x="510" y="340" width="420" height="46" rx="0" fill="#0d1929"/>
  <text x="720" y="358" text-anchor="middle" fill="#34d399" font-size="11" font-weight="700">✓  Intent drift scoring</text>
  <text x="720" y="376" text-anchor="middle" fill="#6ee7b7" font-size="9">0-1 alignment score between output and root task. Always.</text>

  <!-- Divider line -->
  <line x1="480" y1="64" x2="480" y2="390" stroke="#30363d" stroke-width="2"/>

  <!-- VS badge -->
  <circle cx="480" cy="226" r="24" fill="#161b22" stroke="#374151" stroke-width="2"/>
  <text x="480" y="231" text-anchor="middle" fill="#6b7280" font-size="12" font-weight="800">VS</text>

  <!-- Bottom summary -->
  <rect x="30" y="392" width="900" height="30" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="240" y="412" text-anchor="middle" fill="#4b5563" font-size="11">You are the architect of the workforce</text>
  <text x="720" y="412" text-anchor="middle" fill="#34d399" font-size="11" font-weight="700">The task is the architect of the workforce</text>
  <line x1="480" y1="392" x2="480" y2="422" stroke="#374151" stroke-width="1"/>
</svg>
